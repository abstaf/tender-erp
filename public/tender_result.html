<!DOCTYPE html>
<html>
<head>

<title>Tender Result</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400;500;600&display=swap" rel="stylesheet">
<style>

body{
font-family:'Baloo Bhai 2', cursive;
margin:0;
padding:10px 20px;
}
.result-container{
width:100%;
padding:20px 40px;
box-sizing:border-box;
}
td{
font-weight:500;
}
h1{
    margin:5px 0 10px 0;   /* sirf heading jitna hi space */
text-align:center;
font-size:22px;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-bottom:15px;
}
/* normal rows */
tbody tr{
background:#e2edf5;
}

/* alternate rows */
tbody tr:nth-child(even){
background:#cddeec;
}

/* hover effect */
tbody tr:hover{
background:#b3d1e7;
transition:0.2s;
}
*{
font-family:'Baloo Bhai 2', cursive;
}
th{
font-weight:600;
}
/* TABLE */
th:nth-child(3),
td:nth-child(3){
width:300px;
}

th:nth-child(4),
td:nth-child(4){
width:120px;
text-align:center;
}

th:nth-child(6),
td:nth-child(6){
width:100px;
}
th:nth-child(5),
td:nth-child(5){
width:0px;
}
th:nth-child(7),
td:nth-child(7){
width:120px;
text-align:center;
}
table{

width:100%;
border-collapse:collapse;
background:#ffffff;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

/* HEADER */

th{
background:#4f7fa3;
color:white;
padding:12px;
font-weight:600;
font-size:14px;
text-align:center;
}

/* ROW */

td{
padding:12px 10px;
border-bottom:1px solid #eef2f6;
font-size:14px;
vertical-align:middle;
}

tr:hover{
background:#f6f9fc;
transition:0.2s;
}

/* RESULT ROW */
.result-row{
display:flex;
align-items:center;
gap:14px;   /* teeno boxes ke bich gap */
margin-bottom:8px;
}
/* RANK */

.rank{
width:30px;
font-weight:600;
color:#333;
}

/* COMPANY SELECT */

.company-select{
width:210px;
padding:6px 8px;
border:1px solid #d6dee6;
border-radius:5px;
background:#fafcfe;
font-size:13px;
}

/* TYPE */

.type{
width:80px;
padding:6px;
border:1px solid #d6dee6;
border-radius:5px;
background:#fafcfe;
}

/* PREMIUM INPUT */

.premium-input{
width:70px;
padding:6px;
border:1px solid #d6dee6;
border-radius:5px;
text-align:center;
font-size:13px;
background:#fafcfe;
}

/* ADD BUTTON */

.add-btn{
background:#ff9f43;
border:none;
color:white;
width:30px;
height:30px;
cursor:pointer;
border-radius:6px;
font-size:18px;
}

.add-btn:hover

/* SAVE BUTTON */

.save-btn{
background:#4f7fa3;
color:white;
border:none;
padding:7px 14px;
cursor:pointer;
border-radius:6px;
font-size:13px;
}

.save-btn:hover

/* FINAL BOX */

.final-box div{
display:flex;
align-items:center;
gap:4px;
white-space:nowrap;
font-weight:500;
}
.final-box{
display:flex;
flex-direction:column;
gap:10px;
}

.final-amount{
width:70px;
padding:6px;
border:1px solid #d6dee6;
border-radius:5px;
text-align:center;
font-size:13px;
background:#fafcfe;
white-space:nowrap;
}
/* PREMIUM COLORS */

.premium-input.above{
color:#2e9e5b;
font-weight:600;
}

.premium-input.below{
color:#e05050;
font-weight:600;
}

.premium-input.equal{
color:#555;
font-weight:600;
}

.above{
color:#2e9e5b;
font-weight:600;
}

.below{
color:#e05050;
font-weight:600;
}

.equal{
color:#555;
font-weight:600;
}
.money{
white-space:nowrap;
font-weight:500;
}

</style>

</head>

<body>

<div class="result-container">
<h1>📊 Tender Result</h1>

<table>

<thead>
<tr>
<th>Tender ID</th>
<th>Notice number</th>
<th>Work name</th>
<th>WORK TYPE</th>
<th>Time LIMIT</th>

<th>Estimate</th>
<th>Result</th>

<th>Final</th>

<th>Save</th>
</tr>
</thead>

<tbody id="resultTable"></tbody>

</table>

</div>

<script>
const supabaseUrl = "https://dfqqdiervjdwopjtyqmu.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmcXFkaWVydmpkd29wanR5cW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MjU4OTUsImV4cCI6MjA4NzUwMTg5NX0.pN-e2l-yDyFUGWJxyYn6w7VlKBPr6UVGeE9O-DLyy4M";

const client = supabase.createClient(supabaseUrl,supabaseKey);


let companies=[]


async function loadCompanies(){

const {data}=await client
.from("company_list")
.select("company_name")
.order("company_name")

companies=data.map(c=>c.company_name)

}

function companyOptions(){

let html=`<option value="">Select</option>`

companies.forEach(c=>{
html+=`<option value="${c}">${c}</option>`
})

html+=`<option value="other">Add New</option>`

return html

}



async function loadResults(){

const {data}=await client
.from("tenders")
.select("*")
.not("submission_id","is",null)

const table=document.getElementById("resultTable")

table.innerHTML=""

data.forEach(row=>{

table.innerHTML+=`

<tr>

<td>${row.tender_id}</td>
<td>${row.tender_notice_no}</td>
<td>${row.name_of_work}</td>
<td>${row.work_type||""}</td>
<td>${row.time_limit||""}</td>
<td class="estimate"
data-estimate="${row.estimate_amount}">
<span class="money">${formatAmount(row.estimate_amount)}</span>
</td>
<td>

<div id="resultBox_${row.tender_id}">

<div class="result-row">

<span class="rank">L1</span>

<select class="company-select">
${companyOptions()}
</select>

<select class="type" onchange="calculateFinal(${row.tender_id})">
<option value="above">Above</option>
<option value="below">Below</option>
<option value="equal">Equal</option>
</select>

<input class="premium-input"
placeholder="%"
oninput="calculateFinal(${row.tender_id})">

<button class="add-btn"
onclick="addRank(${row.tender_id})">+</button>

</div>

</div>

</td>





<td>
<div id="final_${row.tender_id}" class="final-box"></div>

</td>

<td>

<button class="save-btn"
onclick="saveResult(${row.tender_id})">
Save
</button>

</td>

</tr>

`
loadExistingResult(row.tender_id) 
})

}



function addRank(id){

const box=document.getElementById(`resultBox_${id}`)

const rows=box.querySelectorAll(".result-row")

rows.forEach(r=>{
const btn=r.querySelector(".add-btn")
if(btn) btn.remove()
})

const rank=rows.length+1

const div=document.createElement("div")

div.className="result-row"

div.innerHTML=`

<span class="rank">L${rank}</span>

<select class="company-select">
${companyOptions()}
</select>

<select class="type"
onchange="calculateFinal(${id})">

<option value="above">Above</option>
<option value="below">Below</option>

</select>

<input class="premium-input"
oninput="calculateFinal(${id})"
placeholder="%">

<button class="add-btn"
onclick="addRank(${id})">+</button>

`

box.appendChild(div)

}


function calculateFinal(tenderId){

const tr = document.querySelector(`#resultBox_${tenderId}`).closest("tr")

const estimate =
parseFloat(tr.querySelector(".estimate").dataset.estimate) || 0

const rows = tr.querySelectorAll(".result-row")

const finalBox = tr.querySelector(".final-box")

finalBox.innerHTML = ""

rows.forEach(r=>{

const input = r.querySelector(".premium-input")

let raw = input.value.replace(/[^\d.]/g,"")

if(raw===""){
return
}

let premium = parseFloat(raw)

const type = r.querySelector(".type").value

let final = estimate

input.classList.remove("above","below","equal")

// BELOW
if(type==="below"){

input.classList.add("below")

if(premium>0){
input.value = "-" + premium + "%"
}

final = estimate - (estimate * premium / 100)

}

// ABOVE
else if(type==="above"){

input.classList.add("above")

if(premium>0){
input.value = "+" + premium + "%"
}

final = estimate + (estimate * premium / 100)

}

// EQUAL
else if(type==="equal"){

input.classList.add("equal")

input.value = "0%"

premium = 0

final = estimate

}

finalBox.innerHTML += `
<div class="final-amount">
<span>₹</span>
<span>${Math.round(final).toLocaleString("en-IN")}</span>
</div>`;


})

}


function formatAmount(num){
return "₹ " + Number(num).toLocaleString("en-IN",{
maximumFractionDigits:0
});
}
async function loadExistingResult(tenderId){

const {data,error}=await client
.from("tender_result")
.select("*")
.eq("tender_id",tenderId)
.order("rank",{ascending:true})

if(error){
console.log(error)
return
}

if(!data || data.length===0) return

const box=document.getElementById(`resultBox_${tenderId}`)

box.innerHTML=""

data.forEach((row,index)=>{

const isLast=index===data.length-1

const div=document.createElement("div")

div.className="result-row"

div.innerHTML=`

<span class="rank">${row.rank}</span>

<select class="company-select">
${companyOptions()}
</select>

<select class="type"
onchange="calculateFinal(${tenderId})">

<option value="below">Below</option>
<option value="above">Above</option>
<option value="equal">Equal</option>

</select>

<input class="premium-input"
value="${row.bid_price}"
oninput="calculateFinal(${tenderId})"
placeholder="%">

${isLast?`<button class="add-btn" onclick="addRank(${tenderId})">+</button>`:""}

`

box.appendChild(div)

/* company select set */
div.querySelector(".company-select").value=row.company_name

/* type set */
div.querySelector(".type").value=row.above_below

})

calculateFinal(tenderId)

}

function updateTypeStyle(select){

select.classList.remove("above","below","equal");

if(select.value==="above"){
select.classList.add("above");
}

if(select.value==="below"){
select.classList.add("below");
}

if(select.value==="equal"){
select.classList.add("equal");
}

}
async function saveResult(tenderId){

const box=document.getElementById(`resultBox_${tenderId}`)
const rows=box.querySelectorAll(".result-row")

const tr = box.closest("tr")

const estimate =
parseFloat(tr.querySelector(".estimate").dataset.estimate) || 0

const time_limit = tr.children[2].innerText
const work_type = tr.children[3].innerText

await client
.from("tender_result")
.delete()
.eq("tender_id",tenderId)

let l1Company=null

for(let i=0;i<rows.length;i++){

const company=
rows[i].querySelector(".company-select").value

const type=
rows[i].querySelector(".type").value

let premium=
rows[i].querySelector(".premium-input").value

premium=premium.replace(/[%+=-]/g,"")

let premiumNum=parseFloat(premium)||0

let final=estimate

if(type==="below"){
final = estimate - (estimate * premiumNum / 100)
}

if(type==="above"){
final = estimate + (estimate * premiumNum / 100)
}

if(type==="equal"){
final = estimate
}

if(!company) continue

if(i===0){
l1Company=company
}

await client
.from("tender_result")
.insert({

tender_id:tenderId,
company_name:company,
rank:`L${i+1}`,
bid_price:premium,
above_below:type,

estimate_amount:estimate,
final_amount:final,
time_limit:time_limit,
work_type:work_type

})

}

if(l1Company && l1Company.toUpperCase().trim()==="ANIRAJ BUILDERS"){

await client
.from("tender_awarded")
.delete()
.eq("tender_id",tenderId)

await client
.from("tender_awarded")
.insert({

tender_id:tenderId,
company_name:l1Company

})

}

alert("Saved")

}



async function start(){

await loadCompanies()

await loadResults()

}

start()

</script>

</body>
</html>
