<script>

const supabaseUrl = "https://dfqqdiervjdwopjtyqmu.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmcXFkaWVydmpkd29wanR5cW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MjU4OTUsImV4cCI6MjA4NzUwMTg5NX0.pN-e2l-yDyFUGWJxyYn6w7VlKBPr6UVGeE9O-DLyy4M";


const client = supabase.createClient(supabaseUrl,supabaseKey);

async function loadAwarded(){

const {data,error} = await client
.from("tenders")
.select("*")
.not("submission_id","is",null)
.order("created_at",{ascending:false});

const table = document.getElementById("awardTable");

table.innerHTML="";
let sr = 1;
let totalEmd = 0;
let totalFee = 0;

data.forEach(row=>{

totalEmd += Number(row.emd_amount);
totalFee += Number(row.fee_amount);

table.innerHTML += `
<tr>
    <td>${sr++}</td>
<td>${row.tender_id}</td>
<td>${row.emd_amount}</td>
<td>${row.fee_amount}</td>
</tr>
`;

});
table.innerHTML += `
<tr style="font-weight:bold;background:#f2f2f2;">
    <td></td>
<td>Total</td>
<td>${totalEmd}</td>
<td>${totalFee}</td>
</tr>
`;



}

loadAwarded();

</script>
