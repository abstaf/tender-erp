<!DOCTYPE html>
<html>
<head>
<title>Tender List</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400;500;600;700&display=swap');

body{
  font-family: 'Baloo Bhai 2', cursive;
  background:#eef2f7;
  margin:0;
  font-weight:500;
  letter-spacing:0.3px;
}

table{
  font-family: 'Baloo Bhai 2', cursive;
  font-weight:500;
    border-collapse:collapse;
  width:100%;
}
table td{
  text-align: justify;
  vertical-align: top;
  padding:8px;


}
td:nth-child(2),
td:nth-child(1),
td:nth-child(8),
td:nth-child(9),
td:nth-child(6),
td:nth-child(7),
td:nth-child(12),
td:nth-child(13),
td:nth-child(14)


{
  text-align: center;
  vertical-align: middle;
}
th{
  font-weight:600;
}

td{
  font-weight:500;
  line-height:1.4;
}

.container{
  width:97%;
  margin:20px auto;
}

/* Sticky Header */

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;

  position:sticky;
  top:0;

  background:white;
  z-index:100;

  padding:10px 15px;

  border-radius:10px;

}

.header h2{
  margin:0;
  font-weight:600;
}

.dashboard-btn{
  background:#4f7fa3;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

.add-btn{
  background:#4f7fa3;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}




h2{
    margin:5px 0;
  text-align:center;
  color:#4f7fa3;
  margin-bottom:15px;
  font-size:18px;
}

table{
  width:100%;
  border-collapse: collapse;
  font-size:15px;
}

th, td{
  padding:7px;
  border:1px solid #e2e8f0;
  text-align:center;
    border-left:1px solid #bfbaba;
  border-right:1px solid #bfbaba;

  /* horizontal lines dark */
  border-top:2px solid #2d2c2c;
  border-bottom:1.5px solid #534e4e;
}

th{
  background:#4f7fa3;
  color:white;
}

tr:nth-child(even){
  background:#f9fafb;
}
thead th{
  background:#4f7fa3;
  color:white;
  padding:12px 8px;
  text-align:center;
  font-weight:600;

  border-right:1px solid #ffffff40;

}
tbody tr:hover{
  background:#eef4ff;
  transition:0.2s;
}
.view-btn{
  background:#0f3d5e;
  color:white;
  padding:5px 8px;
  border:none;
  border-radius:5px;
  font-size:11px;
}

/* Actions column center */
td:last-child{
  text-align:center;
  white-space:nowrap;
}

/* Button ka default border & background hatao */
.edit-btn,
.delete-btn{
  background:none;
  border:none;
  padding:0;
  margin:0 6px;
  cursor:pointer;
  font-size:18px;   /* icon size */
}

/* Edit icon dark navy blue */
.edit-btn i{
  color:#1e3a8a;   /* dark navy blue */
}

/* Delete icon red */
.delete-btn i{
  color:#dc2626;
}

/* Hover effect */
.edit-btn:hover i{
  color:#0f172a;
}

.delete-btn:hover i{
  color:#b91c1c;
}



.badge{
  padding:3px 6px;
  border-radius:12px;
  font-size:11px;
  font-weight:600;
}
.pending{ background:#facc15; }
.awarded{ background:#16a34a; color:white; }
.loss{ background:#dc2626; color:white; }





/* Image */
.modal-content{
  display:block;
  margin:auto;
  max-width:80%;
  max-height:80%;
  border-radius:8px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* Close Button */
.modal{
  display:none;
  position:fixed;
  z-index:9999;   /* 999 se badha do */
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  padding:40px;
  overflow:auto;
}
.modal-gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:60px;   /* button ke neeche space */
}

.modal-gallery img{
  width:100%;
  border-radius:8px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.closeModal{
  position:absolute;
  top:15px;
  right:30px;
  font-size:35px;
  color:white;
  cursor:pointer;
}
.modal-close{
  position:fixed;      /* absolute se fixed karo */
  top:20px;
  right:25px;
  background:#ef4444;
  color:white;
  border:none;
  padding:10px 14px;
  font-size:18px;
  border-radius:8px;
  cursor:pointer;
  z-index:10000;       /* modal se bhi upar */
}


.home-btn{
  margin-top:10px;
  float:left;
  background:#16a34a;
  color:white;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  
     margin-right:10px;
}

.home-btn:hover{
   background:#4b5563;
}
.modal-close:hover{
  background:#dc2626;
}
.result-input{
  width:50%;
  padding:6px;
  border:1px solid #ccc;
  border-radius:6px;
}
.doc-container{
   display:flex;
   gap:20px;
   padding:15px;
   background:#f9fafb;
   border-radius:8px;
}

.doc-box{
   background:white;
   padding:12px;
   border-radius:6px;
   box-shadow:0 2px 6px rgba(0,0,0,0.08);
   min-width:180px;
}

.print-btn{
   background:#2563eb;
   color:white;
   border:none;
   padding:6px 10px;
   border-radius:5px;
   cursor:pointer;
   margin-right:5px;
}

.download-btn{
   background:#16a34a;
   color:white;
   border:none;
   padding:6px 10px;
   border-radius:5px;
   cursor:pointer;
}




.toast-message{
   position:fixed;
   bottom:20px;
   right:20px;
   padding:10px 16px;
   border-radius:6px;
   font-size:14px;
   font-weight:500;
   color:white;
   z-index:9999;
   animation:fadeIn 0.3s ease;
}

.toast-message.success{
   background:#16a34a;
}

.toast-message.error{
   background:#dc2626;
}

@keyframes fadeIn{
   from{opacity:0; transform:translateY(10px);}
   to{opacity:1; transform:translateY(0);}
}
.tender-header{
  padding:5px 0;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}.tender-header{
  padding:8px 0;   /* upar niche kam padding */
}
.view-btn{
  background:#6c63ff;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.view-btn:hover{
  background:#574fd6;
}
.emd-info{
  width:140px;
}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:4px 0;
}

.row label{
  width:50px;
  font-weight:400;
}

.row input{
  width:100px;
  height:21px;
  padding:1px 3px;
  font-size:11px;
}

.amount{
  width:90px;
  text-align:right;
  font-weight:500;
}
input::placeholder{
  color:#666;
}

input[type="date"]{
  color:#666;
}
.input-box{
  width:110px;
  height:24px;
  padding:2px 6px;
  font-size:12px;
  margin:3px 0;
  border:1px solid #ccc;
  border-radius:4px;
}

.input-box::placeholder{
  color:#777;
  font-size:11px;
}
.submission-box{
  display:flex;
  flex-direction:column;   /* button niche aayega */
  align-items:center;
  gap:4px;
}

.submission-box input{
  width:100px;
  height:22px;
  padding:2px 4px;
  font-size:12px;
}

.submission-box button{
  padding:2px 8px;
  font-size:11px;
  height:22px;
}
.notice-line1,
.notice-line2,
.notice-line3{
  font-weight:600;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">

    <button onclick="goHome()" class="dashboard-btn">
       Go To Dashboard
    </button>

    <h2>📋 Tender List</h2>

    <button class="add-btn" onclick="openAddTender()">
      + Add Tender
    </button>

  </div>


  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="selectAll"></th>
        <th>Sr. No</th>
        <th>Notice No / ID</th>
        <th>Work Type</th>
        <th>Name of Work</th>
        <th>Last Date</th>
        <th>Estimated Amount</th>
        <th>Number Of Location</th>
        <th>Time Limit</th>
        <th>Fee</th>
        <th>EMD</th>
        <th>Submission ID</th>
        <th>Docs</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="tenderTable"></tbody>
  </table>

  <button id="deleteSelectedBtn">
    Delete Selected
  </button>

</div>

<script>
const supabaseUrl = "https://dfqqdiervjdwopjtyqmu.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmcXFkaWVydmpkd29wanR5cW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MjU4OTUsImV4cCI6MjA4NzUwMTg5NX0.pN-e2l-yDyFUGWJxyYn6w7VlKBPr6UVGeE9O-DLyy4M";

const client = supabase.createClient(supabaseUrl, supabaseKey);

function formatDate(d){ return d ? new Date(d).toLocaleDateString("en-GB") : ""; }
function formatAmount(a){ return a ? new Intl.NumberFormat("en-IN").format(a) : ""; }


async function loadTenders(){
const { data } = await client
  .from("tenders")
  .select("*")
  .is("submission_id", null)
  .order("id",{ascending:true});
  const table = document.getElementById("tenderTable");
  
  table.innerHTML="";
  let totalEstimate = 0;
let totalFee = 0;
let totalEmd = 0;
let totalCount = 0;
let totalworklocation=0;

  data.forEach((row,i)=>{
    table.innerHTML += `
    <tr>
      <td><input type="checkbox" class="rowCheckbox" value="${row.id}"></td>
      <td>${i+1}</td>
<td>
<div class="notice-line1">
${row.tender_notice_no?.split("/")[0] || ""}
</div>

<div class="notice-line2">
${row.tender_notice_no?.split("/")[1] || ""} /
${row.tender_notice_no?.split("/")[2] || ""}
</div>

<div class="notice-line3">
ID: ${row.tender_id || ""}
</div>
</td>
      <td>${row.work_type||""}</td>
      <td>${row.name_of_work||""}</td>
      <td>${formatDate(row.last_date)}</td>
      <td>₹ ${formatAmount(row.estimate_amount)}</td>
    
      <td>${row.work_location||""}</td>
      <td>${row.time_limit||""}</td>
     
<td>
<div class="emd-info">

 
<input 
type="text"
  placeholder="Fee No"
  value="${row.fee_no || ''}"
  onblur="updateField(${row.id}, 'fee_no', this.value)"
  class="input-box">



   <div class="row">
    
    <input    value="${row.fee_date || ''}"
   onblur="updateField(${row.id}, 'fee_date', this.value)">
</div>

<input 
  type="text"
  placeholder="Fee Amount"
  value="₹ ${formatAmount(row.fee_amount)}"
  class="input-box"
  readonly>

</div>
  
</td>
    
<td>
<div class="emd-info">

  <input 
  type="text"
  placeholder="EMD No"
  value="${row.emd_no || ''}"
  onblur="updateField(${row.id}, 'emd_no', this.value)"
  class="input-box">

<div class="row">
  
    <input    value="${row.emd_date || ''}"
   onblur="updateField(${row.id}, 'emd_date', this.value)">
</div>

  <input 
  type="text"
  placeholder="EMD Amount"
  value="₹ ${formatAmount(row.emd_amount)}"
  class="input-box"
  readonly>

</div>
</td>


<td>
  <div class="submission-box">
    <input 
      type="text"
      id="submission_${row.id}"
      placeholder="ID">

    <button onclick="saveSubmission(${row.id})">
      Save
    </button>
  </div>
</td>
   <td>

  <button onclick="toggleDocs(${row.id})" class="view-btn">View</button>

</td>
  <td class="action-buttons">
  <button class="edit-btn" onclick="editTender(${row.id})">
    <i class="fa-solid fa-pen"></i>
  </button>

  <button class="delete-btn"  onclick="deleteSingle(${row.id})">
    <i class="fa-solid fa-trash"></i>
  </button>
</td>
 
    </tr>
<tr id="docRow_${row.id}" style="display:none;">
   <td colspan="100%">
      <div class="doc-container">
         ${createDocBox("Tender NIT", row.tender_nit)}
         ${createDocBox("Tender Estimate", row.estimate_document)}
         ${createDocBox("Tender Calculation", row.tender_calculation)}
         ${createDocBox("Other Document", row.other_document)}
         ${createDocBox("Estimate Link", row.tender_estimant_link)}
      </div>
   </td>
</tr>`;
    totalEstimate += Number(row.estimate_amount) || 0;
totalFee += Number(row.fee_amount) || 0;
totalEmd += Number(row.emd_amount) || 0;
totalworklocation += Number(row.work_location) || 0;
totalCount++;
  });
  table.innerHTML += `
<tr style="background:#e2e8f0;font-weight:bold;">
  <td></td>
  <td colspan="4">TOTAL (${totalCount} Tenders)</td>
  <td></td>
  <td>₹ ${formatAmount(totalEstimate)}</td>
<td></td>
    <td>${formatAmount(totalworklocation)}</td>

 
  <td colspan="1">FEE ₹ ${formatAmount(totalFee)}</td>
  <td colspan="1">EMD ₹ ${formatAmount(totalEmd)}</td>
  <td colspan="3"></td>
</tr>`;

}
loadTenders();

/* SELECT LOGIC */
document.getElementById("selectAll").addEventListener("change",e=>{
  document.querySelectorAll(".rowCheckbox").forEach(cb=>cb.checked=e.target.checked);
  toggleDeleteBtn();
});

document.addEventListener("change",e=>{
  if(e.target.classList.contains("rowCheckbox")) toggleDeleteBtn();
});

function toggleDeleteBtn(){
  document.getElementById("deleteSelectedBtn").style.display =
    document.querySelectorAll(".rowCheckbox:checked").length ? "inline-block" : "none";
}

/* DELETE SELECTED */
document.getElementById("deleteSelectedBtn").addEventListener("click",async()=>{
  const ids=[...document.querySelectorAll(".rowCheckbox:checked")].map(cb=>cb.value);
  if(!confirm("Delete selected tenders?")) return;
  await client.from("tenders").delete().in("id",ids);
  loadTenders();
});

/* SINGLE DELETE */
async function deleteSingle(id){
  if(!confirm("Delete this tender?")) return;
  await client.from("tenders").delete().eq("id",id);
  loadTenders();
}

function openAddTender(){ window.location.href="/tender_form.html"; }
function openModal(nit, estimate, calculation, other){

  const bucketName = "tender-files";
  const projectUrl = "https://dfqqdiervjdwopjtyqmu.supabase.co";

  const gallery = document.getElementById("modalGallery");
  gallery.innerHTML = "";

  const files = [nit, estimate, calculation, other];

 files.forEach(file => {
  if(file){

    const encodedPath = encodeURIComponent(file).replace(/%2F/g, "/");
    const publicUrl = `${projectUrl}/storage/v1/object/public/${bucketName}/${encodedPath}`;

    // 🔹 Anchor create karo (new tab open karne ke liye)
    const link = document.createElement("a");
    link.href = publicUrl;
    link.target = "_blank";   // new tab me open

    // 🔹 Image create karo
    const img = document.createElement("img");
    img.src = publicUrl;
    img.style.marginBottom = "15px";
    img.style.cursor = "pointer";  // hover pe pointer show hoga

    img.onerror = function(){
      console.error("Image failed:", publicUrl);
    }

    // 🔹 Image ko link ke andar daalo
    link.appendChild(img);

    // 🔹 Gallery me add karo
    gallery.appendChild(link);
  }
});
  document.getElementById("imageModal").style.display = "block";
}


function closeModal(){
  document.getElementById("imageModal").style.display = "none";
}
function editTender(id){
  window.location.href = "tender_form.html?id=" + id;
}
async function updateResultId(id, value){
  await client
    .from("tenders")
    .update({ result_id: value })
    .eq("id", id);
}
function goHome(){
   window.location.href = "index.html";
}
function toggleDocs(id){
   const row = document.getElementById("docRow_" + id);
   row.style.display = row.style.display === "none" ? "table-row" : "none";
}
function createDocBox(title, filePath){
   if(!filePath) return "";

   let url = filePath;

   // Agar storage file hai to public URL banayenge
   if(!filePath.startsWith("http")){
      url = client
         .storage
         .from("tender-files")
         .getPublicUrl(filePath).data.publicUrl;
   }

   return `
      <div class="doc-box">
         <strong>${title}</strong><br><br>

<button class="print-btn" onclick="printDoc('${url}')">
Print
</button>
         <button class="download-btn"
            onclick="downloadFile('${url}')">
            Download
         </button>
         <button class="view-btn" onclick="viewDoc('${url}')">View</button>
      </div>
      <div class="doc-card">
      


  
</div>
   `;
}
function downloadFile(url){
   window.open(url + "?download", "_self");
}
async function updateField(id, column, value){

   const { error } = await client
      .from("tenders")
      .update({ [column]: value })
      .eq("id", id);

   if(error){
      showMessage("Update Failed ❌", "error");
      console.error(error);
   } else {
      showMessage("Updated Successfully ✅", "success");
   }
}
function showMessage(text, type){

   const msg = document.createElement("div");
   msg.innerText = text;
   msg.className = "toast-message " + type;

   document.body.appendChild(msg);

   setTimeout(()=>{
      msg.remove();
   }, 2000);
}
function viewDoc(file) {
  window.open(file, "_blank");
}
function printDocument(url){

  const iframe = document.createElement("iframe");
  iframe.style.position = "fixed";
  iframe.style.right = "0";
  iframe.style.bottom = "0";
  iframe.style.width = "0";
  iframe.style.height = "0";
  iframe.style.border = "0";

  iframe.src = url;

  document.body.appendChild(iframe);

  iframe.onload = function(){
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
  };
}
async function saveSubmission(id){

  const submission = document
  .getElementById(`submission_${id}`)
  .value;

  const { error } = await client
  .from("tenders")
  .update({ submission_id: submission })
  .eq("id", id);

  if(!error){

    // table reload
    loadTenders();

  } else {
    alert("Update failed");
  }

}
</script>
<!-- Image Modal -->
<!-- Image Gallery Modal -->
<div id="imageModal" class="modal">
  
  <!-- 🔴 Close Button -->
  <button class="modal-close" onclick="closeModal()">✖</button>
  
  <div id="modalGallery" class="modal-gallery"></div>
</div>
</body>
</html>
