<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aniraj Builders</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; --bg: #f9fafb; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 20px; border: 3px solid #f3f4f6; }
        h2 { margin-bottom: 10px; color: #111827; }
        p { color: #6b7280; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e5e7eb; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.jpeg" class="logo-img" alt="Logo">
    <h2>Welcome Back</h2>
    <p>Please enter your details to login</p>
    
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleLogin()" id="loginBtn">Login to Dashboard</button>
</div>
<script src="./supabse.js"></script>
<script>
  
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');

        btn.innerText = "Authenticating...";
        btn.disabled = true;

        const { data, error } = await client.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Login Failed: " + error.message);
            btn.innerText = "Login to Dashboard";
            btn.disabled = false;
        } else {
            // Success: Go to your main dashboard file
            window.location.href = "dashboard.html"; 
        }
    }
</script>

</body>
</html>
