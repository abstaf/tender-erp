<script>

const supabaseUrl = "https://dfqqdiervjdwopjtyqmu.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmcXFkaWVydmpkd29wanR5cW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MjU4OTUsImV4cCI6MjA4NzUwMTg5NX0.pN-e2l-yDyFUGWJxyYn6w7VlKBPr6UVGeE9O-DLyy4M";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
function getENumber(notice){
if(!notice) return "";
const parts = notice.split("/");
return parts[1] ? parts[1].trim() : "";
}

async function loadWork(){

/* STEP 1 : tender_result se L1 ANIRAJ BUILDERS */

const {data:result,error} = await supabaseClient
.from("tender_result")
.select("tender_id,final_amount,work_type")
.eq("rank","L1")
.eq("company_name","ANIRAJ BUILDERS");

if(error){
console.log(error);
return;
}

/* STEP 2 : tender ids */

const ids = result.map(r => r.tender_id);

/* STEP 3 : tenders table */

const {data:tenders,error:tError} = await supabaseClient
.from("tenders")
.select("tender_id,tender_notice_no,name_of_work,time_limit,department_name")
.in("tender_id",ids);

if(tError){
console.log(tError);
return;
}

/* STEP 4 : work_on_hand table */

const {data:workData} = await supabaseClient
.from("work_on_hand")
.select("*");

/* work map */

const workMap={};
workData.forEach(w=>{
workMap[w.t_id]=w;
});

/* tender map */

const tenderMap={};
tenders.forEach(t=>{
tenderMap[t.tender_id]=t;
});

/* STEP 5 : saveWorkOnHand */

await saveWorkOnHand(result,tenderMap);

/* STEP 6 : show data */

showWork(result,tenderMap,workMap);

}

async function saveWorkOnHand(result,tenderMap){

const {data:existing}=await supabaseClient
.from("work_on_hand")
.select("t_id");

const existingIds=existing.map(e=>e.t_id);

const newRows=result
.filter(r=>{
const notice=tenderMap[r.tender_id]?.tender_notice_no;
const eNo=getENumber(notice);
return !existingIds.includes(eNo);
})
.map(r=>{

const notice=tenderMap[r.tender_id]?.tender_notice_no;

return{

t_id:getENumber(notice),

name_of_work:tenderMap[r.tender_id]?.name_of_work || null,

department_name:tenderMap[r.tender_id]?.department_name || null,
approve_amount:r.final_amount,

time_limit:tenderMap[r.tender_id]?.time_limit || null

}

});

if(newRows.length===0){
console.log("No new tender");
return;
}

const {error}=await supabaseClient
.from("work_on_hand")
.insert(newRows);

if(error){
console.log("Insert error:",error);
}else{
console.log("Saved");
}

}

function showWork(result,tenderMap,workMap){

const tbody=document.getElementById("workTable");
tbody.innerHTML="";

let totalAmount=0;

result.forEach(row=>{

const tender=tenderMap[row.tender_id];
const work=workMap[getENumber(tender?.tender_notice_no)]||{};
const notice=tender?.tender_notice_no;

totalAmount+=Number(row.final_amount);

tbody.innerHTML+=`

<tr>

<td>${getENumber(notice)}</td>
<td>
<input type="text"
class="unique-name"
placeholder="Enter Name"
value="${work.uniq_name||""}"
onchange="saveField('${getENumber(notice)}','uniq_name',this.value)">
</td>

<td class="name-work" title="${tender ? tender.department_name : ""}">
${tender ? tender.department_name : ""}
</td>

<td class="name-work" title="${tender ? tender.name_of_work : ""}">
${tender ? tender.name_of_work : ""}
</td>
<td>
  <input type="text"
class="unique-name"
placeholder="Enter Name"
value="${work.agreement_details||""}"
onchange="saveField('${getENumber(notice)}','agreement_details',this.value)"></td>
<td>${row.work_type}</td>

<td>${tender ? tender.time_limit : ""}</td>
<td class="amount">
₹ ${Number(row.final_amount).toLocaleString('en-IN', { maximumFractionDigits: 0 })}
</td>
<td>
<input type="number"
value="${work.bg_etails||""}"
onchange="saveField('${getENumber(notice)}','bg_etails',this.value)">
</td>

<td>
<input type="number"
value="${work.deposit_details||""}"
onchange="saveField('${getENumber(notice)}','deposit_details',this.value)">
</td>

<td class="doc-cell">

<div class="upload-wrapper">

<input type="file"
accept="application/pdf"
id="file_${row.tender_id}"
hidden
onchange="uploadPDF(event,'${getENumber(notice)}',this)">

${work.tender_document
? `
<div class="file-box">
<a href="${work.tender_document}" target="_blank" class="file-name">
${getFileName(work.tender_document)}
</a>
<span class="delete-file"
onclick="deletePDF('${getENumber(notice)}')">✖</span>
</div>
`
: `
<label for="file_${row.tender_id}" class="upload-btn">
Upload PDF
</label>
`
}

</div>

</td>
<td>

<div id="itemList_${getENumber(notice)}" class="item-list"></div>

<div class="item-input-row">

<select id="item_${getENumber(notice)}" class="major-select">

<option value="">Select Item</option>

${majorItems.map(item => `
<option value="${item.item_name}">
${item.item_name}
</option>
`).join("")}

<option value="add_new">+ Add New Item</option>

</select>

<input type="number"
id="qty_${getENumber(notice)}"
placeholder="Qty"
class="qty-input">

<select id="unit_${getENumber(notice)}" class="unit-select">

<option value="BRASS">BRASS</option>
<option value="NOS">NOS</option>
<option value="MTR">MTR</option>

</select>

<button onclick="addItem('${getENumber(notice)}')" class="add-btn">+</button>

</div>

<td>

<input type="text"
class="date-input"
placeholder="DD/MM/YYYY"
maxlength="10"
oninput="formatDateInput(this)"
value="${work.work_start_date ? formatDate(work.work_start_date) : ""}"
onchange="saveDate('${getENumber(notice)}',this.value)">

</td>
<td>
<input type="text"
class="date-input"
placeholder="DD/MM/YYYY"
maxlength="10"
oninput="formatDateInput(this)"
value="${work.work_end_date ? formatDate(work.work_end_date) : ""}"
onchange="saveDate('${getENumber(notice)}',this.value)">
</td>
</tr>

`;
loadItems(getENumber(notice));

});

document.getElementById("totalTender").innerText=result.length;
document.getElementById("totalAmount").innerText="₹ "+totalAmount.toLocaleString();
loadItems(getENumber(notice));

}
function getFileName(url){
if(!url) return "No file";

const parts=url.split("/");
return parts[parts.length-1];
}
function formatDateInput(input){

let value = input.value.replace(/\D/g,'');

if(value.length > 2 && value.length <= 4){
value = value.slice(0,2) + "/" + value.slice(2);
}
else if(value.length > 4){
value = value.slice(0,2) + "/" + value.slice(2,4) + "/" + value.slice(4,8);
}

input.value = value;

}
async function saveDate(tenderId,dateValue){

if(!dateValue) return;

const parts=dateValue.split("/");

if(parts.length!==3){
alert("Use DD/MM/YYYY format");
return;
}

const day=parts[0];
const month=parts[1];
const year=parts[2];

const formattedDate=`${year}-${month}-${day}`;
const endDate=`${year}-${month}-${day}`;

await supabaseClient
.from("work_on_hand")
.update({
  work_start_date:formattedDate,
work_end_date: endDate
})
.eq("t_id",tenderId);

}
let majorItems=[];

async function loadMajorItems(){

const {data,error}=await supabaseClient
.from("major_item")
.select("item_name");

if(error){
console.log(error);
return;
}

majorItems=data;

}
async function saveMajorItem(e_no,value){

if(value==="add_new"){

let newItem = prompt("Enter New Major Item");

if(!newItem) return;

const {error}=await supabaseClient
.from("major_item")
.insert([{item_name:newItem}]);

if(error){
console.log(error);
return;
}

/* dropdown reload */
await loadMajorItems();
await loadWork();

}

}
async function loadItems(eNo){

const {data,error} = await supabaseClient
.from("item_detail")
.select("*")
.eq("t_id",eNo);

if(error){
console.log(error);
return;
}

const list=document.getElementById(`itemList_${eNo}`);

list.innerHTML="";

data.forEach((row,i)=>{

list.innerHTML+=`
<div class="item-row">

<span>${i+1}. ${row.item_name} ${row.quantity} ${row.unit}</span>

<span class="delete-item"
onclick="deleteItem(${row.id},'${eNo}')">❌</span>

</div>
`;

});

}
async function deleteItem(id,eNo){

const confirmDelete = confirm("Delete this item?");

if(!confirmDelete) return;

const {error}=await supabaseClient
.from("item_detail")
.delete()
.eq("id",id);

if(error){
console.log(error);
return;
}

loadItems(eNo);

}
function addItem(eNo){

const item=document.getElementById(`item_${eNo}`).value;
const qty=document.getElementById(`qty_${eNo}`).value;
const unit=document.getElementById(`unit_${eNo}`).value;

if(!item || !qty){
alert("Select item and quantity");
return;
}

saveItem(eNo,item,qty,unit);

loadItems(eNo);

}
async function saveItem(tId,item,qty,unit){

const {error} = await supabaseClient
.from("item_detail")
.insert({
t_id:tId,
item_name:item,
quantity:qty,
unit:unit
});

if(error){
console.log(error);
}else{
console.log("Item Saved");
}

}
function formatDate(date){

const d=new Date(date);

const day=String(d.getDate()).padStart(2,'0');
const month=String(d.getMonth()+1).padStart(2,'0');
const year=d.getFullYear();

return `${day}/${month}/${year}`;

}
async function deletePDF(tenderId){

const confirmDelete = confirm("Delete this document?");
if(!confirmDelete) return;

const {data} = await supabaseClient
.from("work_on_hand")
.select("tender_document")
.eq("t_id",tenderId)
.single();

if(!data) return;

const fileUrl = data.tender_document;
const fileName = fileUrl.split("/").pop();

/* delete from storage */

await supabaseClient.storage
.from("work_on_hand_document")
.remove([fileName]);

/* remove from database */

await supabaseClient
.from("work_on_hand")
.update({tender_document:null})
.eq("t_id",tenderId);

/* reload UI */

loadWork();
}
async function uploadPDF(event,tenderId,input){

const file=input.files[0];
if(!file) return;

/* show file name */

const fileNameSpan=input.parentElement.querySelector(".file-name");
fileNameSpan.textContent=file.name;

/* upload */

const fileName=`${tenderId}_${Date.now()}.pdf`;

const {error}=await supabaseClient.storage
.from("work_on_hand_document")
.upload(fileName,file);

if(error){
console.log("Upload error:",error);
return;
}

const {data:urlData}=supabaseClient.storage
.from("work_on_hand_document")
.getPublicUrl(fileName);

await supabaseClient
.from("work_on_hand")
.update({tender_document:urlData.publicUrl})
.eq("t_id",tenderId);

}

async function saveField(tenderId,column,value){

console.log("Updating:",tenderId,column,value);

const updateData = {};
updateData[column] = value;

const {data,error} = await supabaseClient
.from("work_on_hand")
.update(updateData)
.eq("t_id",tenderId)
.select();

if(error){
console.error("Update error:",error);
}else{
console.log("Updated:",data);
}

}

async function startPage(){

await loadMajorItems();
await loadWork();

}

startPage();

</script>
